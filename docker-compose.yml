
services:
  postgres:
    image: postgres:latest
    container_name: social-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: social_media
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d social_media"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social-network

  mongodb:
    image: mongo:latest
    container_name: social-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: social_messages
    volumes:
      - mongodb_data:/data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social-network

  redis:
    image: redis:latest
    container_name: social-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass password123
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: social-backend
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_URL: postgresql://admin:password123@postgres:5432/social_media
      MONGO_URL: mongodb://admin:password123@mongodb:27017/social_messages?authSource=admin
      REDIS_URL: redis://:password123@redis:6379
      JWT_SECRET: your_super_secret_jwt_key_change_this_in_production_2024
      JWT_EXPIRE: 7d
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - social-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: social-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - social-network
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  social-network:
    driver: bridge